name: Release

on:
  push:
    branches:
      - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep "^version" Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

  build:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: lolkitten.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: lolkitten.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: lolkitten
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: lolkitten
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: lolkitten
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: lolkitten

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set custom toolchain for Linux ARM64
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} release/
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x release/${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lolkitten-${{ matrix.target }}
          path: release/${{ matrix.artifact_name }}

  release:
    needs: [extract-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release using gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.extract-version.outputs.version }}"

          # Create release
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "Auto-generated release for $VERSION" \
            --target "${{ github.sha }}"

          # Upload assets
          for file in artifacts/*/*; do
            if [ -f "$file" ]; then
              gh release upload "$VERSION" "$file" --clobber
            fi
          done
